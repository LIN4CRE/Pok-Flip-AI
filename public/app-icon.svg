<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>

    <linearGradient id="goldMetallic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="35%" stop-color="#f59e0b"/>
      <stop offset="70%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>

    <linearGradient id="cyanNeon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>

    <filter id="iconGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Main Rounded Glass Badge -->
  <rect x="16" y="16" width="480" height="480" rx="110" fill="url(#iconBg)" stroke="#334155" stroke-width="6"/>
  <rect x="28" y="28" width="456" height="456" rx="98" fill="none" stroke="url(#cyanNeon)" stroke-width="3" opacity="0.6"/>

  <!-- Background Financial Arrow Pattern -->
  <path d="M120,380 L220,280 L300,320 L400,160 L420,220 M400,160 L420,160 L420,180" fill="none" stroke="#f59e0b" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>

  <!-- Center Stylized Pokéball & Candlestick Emblem -->
  <g transform="translate(256, 256)">
    <!-- Outer Golden Ring -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="url(#goldMetallic)" stroke-width="16" filter="url(#iconGlow)"/>
    
    <!-- Pokéball Top Half (Ruby) -->
    <path d="M -132,0 A 132,132 0 0,1 132,0 Z" fill="#ef4444"/>
    <path d="M -132,0 A 132,132 0 0,1 132,0 Z" fill="url(#goldMetallic)" opacity="0.2"/>

    <!-- Pokéball Bottom Half (Pearl) -->
    <path d="M -132,0 A 132,132 0 0,0 132,0 Z" fill="#f8fafc"/>

    <!-- Center Separator Bar -->
    <line x1="-132" y1="0" x2="132" y2="0" stroke="#0f172a" stroke-width="24"/>

    <!-- Center Button Outer -->
    <circle cx="0" cy="0" r="42" fill="#0f172a"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="url(#goldMetallic)" stroke-width="8"/>
    
    <!-- Glowing AI Core Inner Button -->
    <circle cx="0" cy="0" r="18" fill="#38bdf8" filter="url(#iconGlow)"/>

    <!-- Rising Stock Arrow Overlay -->
    <path d="M -60,80 L 0,20 L 60,40 L 110,-60" fill="none" stroke="#10b981" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" filter="url(#iconGlow)"/>
    <polygon points="110,-85 125,-45 85,-55" fill="#10b981"/>
  </g>

  <!-- Lightning Sparkles -->
  <path d="M110,120 L115,135 L130,140 L115,145 L110,160 L105,145 L90,140 L105,135 Z" fill="#fbbf24" filter="url(#iconGlow)"/>
  <path d="M390,380 L393,392 L405,396 L393,400 L390,412 L387,400 L375,396 L387,392 Z" fill="#38bdf8" filter="url(#iconGlow)"/>
</svg>
