name: Build & Deploy Unsigned Android APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Unsigned Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: ☕ Setup Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install NPM Dependencies
        run: npm install

      - name: 🔍 Lint & Type Check Code
        run: npm run lint

      - name: 🚀 Build Vite Web Application
        run: npm run build

      - name: 📱 Add & Sync Capacitor Android Platform
        run: |
          npx cap add android || true
          npx cap sync android

      - name: 🛠️ Grant Executable Permissions to Gradle
        run: opacity=1 chmod +x android/gradlew || true

      - name: ⚙️ Build Unsigned APK via Gradle
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: 📤 Upload Unsigned APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pokeflip-ai-unsigned-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: 🚀 Create GitHub Release & Deploy APK (On Tag or Main Push)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PokéFlip AI Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: android/app/build/outputs/apk/debug/app-debug.apk
          body: |
            ## ⚡ PokéFlip AI Mobile Release
            Automated build output generated by GitHub Actions CI/CD Pipeline.
            
            ### 📱 Installation Instructions:
            1. Download `app-debug.apk` (or `pokeflip-ai-unsigned-debug-apk`).
            2. Enable **"Install from Unknown Sources"** in Android Settings.
            3. Tap the downloaded APK to install PokéFlip AI natively on your Android device!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
